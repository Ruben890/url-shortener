{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>acortadro Url</title>
    <!-- link de css-->
    <link rel="stylesheet" href="{% static 'CSS/style.css' %}">
    <!-- linck css bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="">Generador de url</a></li>
      </ul>
    </nav>
    </header>

    <main class="container-fluid">

      <section class="ingresarUrl">
        <nav>
          <h1>Acortar url</h1>
        </nav>
         
        <form method="post" class="generic_url">
          <div>
            {% csrf_token %}
            {{ form.as_p }}
          </div>
          <button type="submit" class="btn btn-primary">generan url</button>
        </form>
      </section>

      <section class="qr">
        <img src="{% static 'img/qr-scan.png' %}" alt="">
      </section>

      <section class="result">
        <nav>
          <h1>Mis Url</h1>
        </nav>
      
        <div>
          {% for i in url %}
            <li>
              <a href="url/{{i.acor_url}}" target="_blank">{{ i.acor_url }}</a>
              <a href="Qr/{{i.url}}" class="btn_qr"><img src="{% static 'img/qr-scan.png' %}" alt="generic Qr"></a>
            </li>
          {% endfor %}
        </div>
      </section>
    </main>

    <!-- link Js bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script>
  </body>
</html>
